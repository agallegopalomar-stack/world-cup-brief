<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Brief</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 48px 24px;
      background: #fff;
      color: #1d1d1f;
    }

    main {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .hero {
      padding: 40px 0 48px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 10vw, 6.25rem);
      line-height: .98;
      letter-spacing: -.07em;
    }

    .subtitle {
      margin: 22px 0 0;
      color: #6e6e73;
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      letter-spacing: -.02em;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .card {
      padding: 28px;
      border: 1px solid #e5e5e7;
      border-radius: 24px;
      background: #fbfbfd;
      box-shadow: 0 1px 2px rgb(0 0 0 / 3%);
    }

    .label {
      margin: 0 0 12px;
      color: #6e6e73;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .09em;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2rem);
      letter-spacing: -.04em;
    }

    .summary {
      min-height: 3.1em;
      margin: 12px 0 20px;
      color: #424245;
      font-size: 1.05rem;
      line-height: 1.5;
    }

    .button {
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: #0071e3;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-size: .95rem;
      font-weight: 600;
      transition: background 160ms ease, transform 160ms ease;
    }

    .button:hover { background: #0077ed; }
    .button:active { transform: scale(.97); }
    .button:focus-visible,
    .team-option:focus-within {
      outline: 3px solid #0071e3;
      outline-offset: 4px;
    }

    .fixture {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -.04em;
    }

    .fixture-details {
      margin: 12px 0 0;
      color: #6e6e73;
      line-height: 1.55;
    }

    .fixture-details span { display: block; }

    .teams {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .team-option {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 54px;
      padding: 14px 16px;
      border: 1px solid #dedee3;
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .team-option:hover { transform: translateY(-1px); }

    .team-option:has(input:checked) {
      border-color: #0071e3;
      background: #eef6ff;
      color: #0066cc;
    }

    .team-option input {
      position: absolute;
      opacity: 0;
      inset: 0;
      cursor: pointer;
    }

    .saved-note {
      min-height: 1.4em;
      margin: 16px 0 0;
      color: #6e6e73;
      font-size: .9rem;
    }

    @media (max-width: 460px) {
      body { padding: 24px 16px; }
      .hero { padding: 28px 0 36px; }
      .card { padding: 22px; border-radius: 20px; }
      .teams { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1>World Cup Brief</h1>
      <p class="subtitle">Mi primera aplicación creada con IA</p>
    </header>

    <section class="grid" aria-label="Resumen del Mundial">
      <article class="card">
        <p class="label">NEWS</p>
        <h2>Resumen del día</h2>
        <p class="summary" id="daily-summary" aria-live="polite"></p>
        <button class="button" type="button" id="refresh-news">Actualizar resumen</button>
      </article>

      <article class="card">
        <p class="label">PLANNING</p>
        <p class="fixture">España 🇪🇸 vs Arabia Saudí 🇸🇦</p>
        <p class="fixture-details">
          <span>21 junio · 18:00</span>
          <span>MetLife Stadium</span>
        </p>
      </article>

      <section class="card" aria-labelledby="favorites-title">
        <p class="label">MY TEAMS</p>
        <h2 id="favorites-title">Equipos favoritos</h2>
        <div class="teams">
          <label class="team-option">
            <input type="checkbox" name="team" value="España 🇪🇸">
            España 🇪🇸
          </label>
          <label class="team-option">
            <input type="checkbox" name="team" value="Brasil 🇧🇷">
            Brasil 🇧🇷
          </label>
          <label class="team-option">
            <input type="checkbox" name="team" value="Argentina 🇦🇷">
            Argentina 🇦🇷
          </label>
          <label class="team-option">
            <input type="checkbox" name="team" value="Francia 🇫🇷">
            Francia 🇫🇷
          </label>
        </div>
        <p class="saved-note" id="saved-note" aria-live="polite"></p>
      </section>
    </section>
  </main>

  <script>
    const summaries = [
      "España ultima los detalles para su estreno con una sesión táctica cargada de energía.",
      "Las grandes selecciones afinan sus convocatorias mientras crece la expectación por el torneo.",
      "El MetLife Stadium se prepara para una noche de fútbol con ambiente de final.",
      "Brasil y Argentina ya miran al calendario: cada partido cuenta desde el primer día.",
      "La cuenta atrás para el Mundial 2026 entra en su fase más emocionante."
    ];

    const storageKey = "world-cup-brief-favorite-teams";
    const summary = document.querySelector("#daily-summary");
    const refreshNews = document.querySelector("#refresh-news");
    const teamInputs = [...document.querySelectorAll('input[name="team"]')];
    const savedNote = document.querySelector("#saved-note");

    function showRandomSummary() {
      const index = Math.floor(Math.random() * summaries.length);
      summary.textContent = summaries[index];
    }

    function getSavedTeams() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveTeams() {
      const selected = teamInputs
        .filter((input) => input.checked)
        .map((input) => input.value);

      try {
        localStorage.setItem(storageKey, JSON.stringify(selected));
        savedNote.textContent = selected.length
          ? "Tus favoritos se han guardado."
          : "Selecciona los equipos que quieras seguir.";
      } catch {
        savedNote.textContent = "No se ha podido guardar la selección en este navegador.";
      }
    }

    function restoreTeams() {
      const savedTeams = getSavedTeams();
      teamInputs.forEach((input) => {
        input.checked = savedTeams.includes(input.value);
      });
      savedNote.textContent = savedTeams.length
        ? "Tus equipos favoritos se han recuperado."
        : "Selecciona los equipos que quieras seguir.";
    }

    refreshNews.addEventListener("click", showRandomSummary);
    teamInputs.forEach((input) => input.addEventListener("change", saveTeams));

    showRandomSummary();
    restoreTeams();
  </script>
</body>
</html>
